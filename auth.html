<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş / Kayıt - Mehmet Yeşin</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="styles.css">
    <style>
        .auth-section {
            min-height: calc(100vh - 80px);
            margin-top: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, rgba(37,99,235,0.05), rgba(14,165,233,0.05));
            padding: 40px 20px;
        }
        .auth-box {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            border: 1px solid var(--border);
            width: 100%;
            max-width: 440px;
            overflow: hidden;
        }
        .auth-tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
        }
        .auth-tab {
            flex: 1;
            padding: 18px;
            background: none;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            color: var(--text-light);
            transition: all 0.3s;
        }
        .auth-tab.active {
            color: var(--primary);
            border-bottom: 3px solid var(--primary);
            background: rgba(37,99,235,0.03);
        }
        .auth-form-panel {
            padding: 35px;
            display: none;
        }
        .auth-form-panel.active { display: block; }
        .auth-form-panel h2 {
            font-size: 24px;
            margin-bottom: 8px;
            color: var(--text-dark);
        }
        .auth-form-panel p {
            color: var(--text-light);
            font-size: 14px;
            margin-bottom: 25px;
        }
        .auth-message {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
        .auth-message.success { background: #d1fae5; border: 1px solid #6ee7b7; color: #065f46; }
        .auth-message.error { background: #fee2e2; border: 1px solid #fca5a5; color: #991b1b; }
        .auth-form-panel .btn { width: 100%; margin-top: 5px; }
        .admin-link {
            text-align: center;
            margin-top: 15px;
            font-size: 13px;
            color: var(--text-light);
        }
        .admin-link a { color: var(--primary); text-decoration: none; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-content">
                <a href="index.html" class="logo">
                    <span class="logo-icon">▲</span>
                    <span class="logo-text">Portfolio</span>
                </a>
                <ul class="nav-menu" id="navMenu">
                    <li><a href="index.html" class="nav-link">Ana Sayfa</a></li>
                    <li><a href="about.html" class="nav-link">Hakkında</a></li>
                    <li><a href="projects.html" class="nav-link">Projeler</a></li>
                    <li><a href="services.html" class="nav-link">Hizmetler</a></li>
                    <li><a href="contact.html" class="nav-link">İletişim</a></li>
                    <li><a href="auth.html" class="nav-link nav-link-auth active">Giriş Yap</a></li>
                </ul>
                <button class="menu-toggle" id="menuToggle" aria-label="Menüyü aç/kapat">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </div>
    </nav>

    <div class="auth-section">
        <div class="auth-box">
            <div class="auth-tabs">
                <button class="auth-tab active" onclick="switchTab('login')">Giriş Yap</button>
                <button class="auth-tab" onclick="switchTab('register')">Kayıt Ol</button>
            </div>

            <!-- Giriş Formu -->
            <div class="auth-form-panel active" id="loginPanel">
                <h2>Hoş Geldiniz</h2>
                <p>Hesabınıza giriş yapın</p>
                <div class="auth-message" id="loginMsg"></div>
                <div class="form-group">
                    <label for="loginEmail">E-posta</label>
                    <input type="email" id="loginEmail" placeholder="E-posta adresinizi girin">
                </div>
                <div class="form-group">
                    <label for="loginPassword">Şifre</label>
                    <input type="password" id="loginPassword" placeholder="Şifrenizi girin">
                </div>
                <button class="btn btn-primary" onclick="handleLogin()">Giriş Yap</button>
                <div class="admin-link">
                    Hesabınız yok mu? <a href="#" onclick="switchTab('register')">Kayıt olun</a>
                </div>
            </div>

            <!-- Kayıt Formu -->
            <div class="auth-form-panel" id="registerPanel">
                <h2>Hesap Oluştur</h2>
                <p>Yeni bir hesap oluşturun</p>
                <div class="auth-message" id="registerMsg"></div>
                <div class="form-group">
                    <label for="regUsername">Kullanıcı Adı</label>
                    <input type="text" id="regUsername" placeholder="Kullanıcı adı seçin">
                </div>
                <div class="form-group">
                    <label for="regEmail">E-posta</label>
                    <input type="email" id="regEmail" placeholder="E-posta adresinizi girin">
                </div>
                <div class="form-group">
                    <label for="regPassword">Şifre</label>
                    <input type="password" id="regPassword" placeholder="En az 6 karakter">
                </div>
                <div class="form-group">
                    <label for="regConfirm">Şifre Tekrar</label>
                    <input type="password" id="regConfirm" placeholder="Şifrenizi tekrar girin">
                </div>
                <button class="btn btn-primary" onclick="handleRegister()">Kayıt Ol</button>
                <div class="admin-link">
                    Zaten hesabınız var mı? <a href="#" onclick="switchTab('login')">Giriş yapın</a>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
